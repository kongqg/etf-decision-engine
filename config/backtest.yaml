execution:
  default_slippage_bps: 3.0
  annualization_days: 252

historical_data:
  cache_enabled: true
  cache_dir: data/history_cache
  minimum_real_source_ratio: 0.8
  minimum_formal_day_ratio: 0.8

grid_search:
  objective_weights:
    total_return_weight: 1.0
    max_drawdown_weight: 0.6
    turnover_penalty_weight: 0.5
    replacement_penalty_weight: 0.4
  search_space:
    intra_score_weights.momentum_20d_rank:
      - 0.25
      - 0.30
      - 0.35
    intra_score_weights.trend_rank:
      - 0.10
      - 0.15
      - 0.20
    final_score_weights.category_score:
      - 0.20
      - 0.30
      - 0.40
    selection.replace_threshold:
      - 5.0
      - 8.0
      - 10.0
    selection.max_selected_total:
      - 2
      - 3
    selection.max_selected_per_category:
      - 1
      - 2
