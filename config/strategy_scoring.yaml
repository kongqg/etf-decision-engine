normalization:
  method: percentile_rank
  scale: 100.0
  directions:
    momentum_20d: higher
    momentum_10d: higher
    momentum_5d: higher
    trend_strength: higher
    volatility_20d: lower
    drawdown_20d: lower
    liquidity_score: higher

intra_score_weights:
  momentum_20d_rank: 0.30
  momentum_10d_rank: 0.20
  momentum_5d_rank: 0.10
  trend_rank: 0.15
  liquidity_rank: 0.10
  volatility_rank: 0.075
  drawdown_rank: 0.075

category_score:
  top_n: 3
  breadth_positive_thresholds:
    momentum_20d_min: 0.0
    trend_strength_min: 0.0
  breadth_components:
    positive_momentum_20d: 0.4
    positive_trend_strength: 0.3
    above_ma20_flag: 0.3
  weights:
    top_mean_intrascore: 0.5
    breadth_score: 0.3
    category_momentum_score: 0.2

final_score_weights:
  intra_score: 0.7
  category_score: 0.3

selection:
  min_final_score_for_target: 55.0
  candidate_watchlist_size: 8
