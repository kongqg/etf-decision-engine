[app]
name = "ETF 实时决策助手"
timezone = "Asia/Shanghai"
database_url = "sqlite:///./data/app.db"
default_user_id = 1
data_cache_days = 2
min_refresh_history_days = 40
data_stale_minutes = 10

[decision]
top_n_default = 3
min_score_to_buy = 55.0
min_score_gap_for_single = 8.0
initial_build_ratio = 0.6
default_min_advice_amount = 100.0
budget_filter_enabled = true
default_lot_size = 100
show_watchlist_recommendations = true
fee_filter_enabled = true
default_fee_rate = 0.0003
default_min_fee = 1.0
max_fee_rate_for_execution = 0.015
show_cost_inefficient_recommendations = true
budget_substitute_enabled = true
budget_substitute_top_n = 2

[execution]
timing_optimization_enabled = true
show_timing_suggestions = true

[ui]
currency_symbol = "¥"
show_debug_badges = false
