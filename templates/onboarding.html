{% extends "base.html" %}

{% block content %}
<section class="hero">
    <div>
        <div class="eyebrow">首次使用</div>
        <h2>先设置资金、风险偏好和可投资品类</h2>
        <p>系统会基于这些偏好做全 ETF 过滤、评分和预算分配，后续仍可在设置页继续调整。</p>
    </div>
</section>

<section class="card wide">
    <form action="/actions/init-user" method="post" class="form-grid">
        <label>
            <span>初始总资产</span>
            <input type="number" name="initial_capital" min="1000" step="1000" placeholder="例如 100000" required>
        </label>
        <label>
            <span>风险偏好</span>
            <select name="risk_level">
                <option value="保守">保守</option>
                <option value="中性" selected>中性</option>
                <option value="激进">激进</option>
            </select>
        </label>
        <label>
            <span>风险模式</span>
            <select name="risk_mode">
                <option value="conservative">稳一点</option>
                <option value="balanced" selected>正常</option>
                <option value="aggressive">冲一点</option>
            </select>
            <small class="muted">风险模式只影响预算和替换阈值，不包裹旧的多层决策结构。</small>
        </label>
        <label>
            <span>最小建议金额</span>
            <input type="number" name="min_trade_amount" min="100" step="100" value="1000" required>
            <small class="muted">低于该金额的调仓变化默认不会生成明确交易动作。</small>
        </label>
        <label class="check">
            <input type="checkbox" name="allow_gold" checked>
            <span>允许黄金 ETF</span>
        </label>
        <label class="check">
            <input type="checkbox" name="allow_bond" checked>
            <span>允许债券 ETF</span>
        </label>
        <label class="check">
            <input type="checkbox" name="allow_overseas" checked>
            <span>允许跨境 ETF</span>
        </label>
        <div class="form-actions">
            <button class="primary" type="submit">初始化</button>
        </div>
    </form>
</section>
{% endblock %}
